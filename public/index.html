<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduKids - Aprenda Brincando!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; text-align: center; }
    h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      border-radius: 24px;
      padding: 30px 20px;
      text-decoration: none;
      color: white;
      display: block;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .card::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    .card-1 { background: linear-gradient(135deg, #f472b6, #e11d48); }
    .card-2 { background: linear-gradient(135deg, #22d3ee, #3b82f6); }
    .card-3 { background: linear-gradient(135deg, #fbbf24, #f97316); }
    .card-4 { background: linear-gradient(135deg, #34d399, #22c55e); }
    .emoji { font-size: 3.5rem; margin-bottom: 10px; display: block; }
    .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
    .card-desc { font-size: 0.95rem; opacity: 0.9; }
    .stars { margin-top: 10px; font-size: 1.3rem; }
    .star { color: #FFD700; text-shadow: 0 0 4px rgba(255,215,0,0.5); }
    .star-empty { opacity: 0.3; }
    footer { margin-top: 40px; opacity: 0.6; font-size: 0.9rem; }
    .welcome { 
      background: rgba(255,255,255,0.15); 
      backdrop-filter: blur(10px); 
      border-radius: 50px; 
      padding: 10px 25px; 
      display: inline-block; 
      margin-bottom: 25px;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌟 EduKids</h1>
    <p class="subtitle">Olá, Pedro! Pronto para aprender? 🎒</p>

    <div class="grid">
      <a href="vogais.html" class="card card-1">
        <span class="emoji">🔤</span>
        <div class="card-title">Vogais</div>
        <div class="card-desc">A, E, I, O, U com sons e animações!</div>
        <div class="stars">
          <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
        </div>
      </a>

      <a href="formas.html" class="card card-2">
        <span class="emoji">🔷</span>
        <div class="card-title">Formas</div>
        <div class="card-desc">Quadrado, círculo, triângulo e mais!</div>
        <div class="stars">
          <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
        </div>
      </a>

      <a href="numeros.html" class="card card-3">
        <span class="emoji">🔢</span>
        <div class="card-title">Números</div>
        <div class="card-desc">Conte de 1 a 10 de forma divertida!</div>
        <div class="stars">
          <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
        </div>
      </a>

      <a href="fala.html" class="card card-4">
        <span class="emoji">🎤</span>
        <div class="card-title">Fala e Pronúncia</div>
        <div class="card-desc">Pratique falando com o microfone!</div>
        <div class="stars">
          <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
        </div>
      </a>
    </div>

    <footer>Feito com 💜 para Pedro</footer>
  </div>
</body>
</html>
