<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Números - EduKids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; text-align: center; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .back-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 10px 20px; border-radius: 50px; font-size: 1rem;
      cursor: pointer; text-decoration: none; font-weight: bold;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .progress-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); border-radius: 10px; transition: width 0.5s; }
    .card {
      background: linear-gradient(135deg, #f87171, #e11d48);
      border-radius: 30px; padding: 40px 20px; margin-bottom: 25px;
    }
    .numero { font-size: 7rem; font-weight: 900; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); margin-bottom: 15px; }
    .frutas { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 400px; margin: 0 auto 20px; font-size: 2rem; }
    .fruta { animation: pop 0.4s ease-out; }
    .info { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
    .hint { opacity: 0.8; margin-bottom: 20px; font-size: 0.95rem; }
    .btn {
      background: linear-gradient(145deg, #FF6B6B, #ee5a5a);
      color: white; border: none; padding: 15px 30px;
      border-radius: 16px; font-size: 1.1rem; font-weight: bold;
      cursor: pointer; box-shadow: 0 6px 0 #c44444, 0 10px 20px rgba(0,0,0,0.2);
      margin: 5px;
    }
    .btn:active { transform: translateY(6px); box-shadow: 0 0 0 #c44444; }
    .btn-green {
      background: linear-gradient(145deg, #4ECDC4, #3dbdb5);
      box-shadow: 0 6px 0 #2a9d96, 0 10px 20px rgba(0,0,0,0.2);
    }
    .btn-green:active { box-shadow: 0 0 0 #2a9d96; }
    .nav { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
    .nav-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 12px 25px; border-radius: 50px; font-size: 1rem;
      font-weight: bold; cursor: pointer;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.3); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn.finish { background: white; color: #ea580c; }
    .complete { text-align: center; padding: 30px; }
    .complete .trophy { font-size: 4rem; margin-bottom: 10px; }
    .complete h2 { font-size: 2rem; margin-bottom: 10px; }
    .stars-big { font-size: 2.5rem; margin-top: 15px; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @media (max-width: 600px) {
      .numero { font-size: 5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-btn">← Voltar</a>
      <h1>🔢 Números</h1>
      <div style="width:80px"></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:10%"></div></div>

    <div id="content">
      <div class="card" id="card">
        <div class="numero" id="numero">1</div>
        <div class="frutas" id="frutas"></div>
        <div class="info" id="info">1 fruta</div>
        <div class="hint" id="hint">Vamos lá, Pedro! Você consegue! 💪</div>
        <div>
          <button class="btn" onclick="speak(String(numAtual.num))">🔊 Número</button>
          <button class="btn btn-green" onclick="speak(numAtual.num + ' ' + numAtual.palavra)">🔊 Contar</button>
        </div>
      </div>

      <div class="nav">
        <button class="nav-btn" id="prevBtn" onclick="prev()" disabled>← Anterior</button>
        <button class="nav-btn finish" id="nextBtn" onclick="next()">Próximo →</button>
      </div>
    </div>

    <div id="complete" class="complete" style="display:none">
      <div class="trophy">🎉🏆🎉</div>
      <h2>Pedro, você completou os números! Que orgulho! 🏅</h2>
      <p>Parabéns, Pedro! 🎉</p>
      <div class="stars-big">⭐⭐⭐</div>
      <br><br>
      <a href="index.html" class="back-btn">Voltar ao Menu</a>
    </div>
  </div>

  <script>
    const numeros = [
      { num: 1, emoji: '🍎', cor: 'linear-gradient(135deg, #f87171, #e11d48)' },
      { num: 2, emoji: '🍌', cor: 'linear-gradient(135deg, #fbbf24, #f59e0b)' },
      { num: 3, emoji: '🍇', cor: 'linear-gradient(135deg, #a78bfa, #7c3aed)' },
      { num: 4, emoji: '🍊', cor: 'linear-gradient(135deg, #fb923c, #ea580c)' },
      { num: 5, emoji: '🍓', cor: 'linear-gradient(135deg, #f472b6, #e11d48)' },
      { num: 6, emoji: '🍒', cor: 'linear-gradient(135deg, #f87171, #ec4899)' },
      { num: 7, emoji: '🍑', cor: 'linear-gradient(135deg, #fdba74, #f97316)' },
      { num: 8, emoji: '🍍', cor: 'linear-gradient(135deg, #fde047, #eab308)' },
      { num: 9, emoji: '🥝', cor: 'linear-gradient(135deg, #4ade80, #16a34a)' },
      { num: 10, emoji: '🍉', cor: 'linear-gradient(135deg, #22c55e, #0d9488)' },
    ];

    const hints = [
      "Vamos lá, Pedro! Você consegue! 💪",
      "Preste atenção, Pedro! 👀",
      "Pedro, fale bem alto e claro! 🗣️",
      "Quase lá, Pedro! Tente de novo! 🎯",
      "Pedro, respira fundo e tenta mais uma vez! 🌬️"
    ];

    let idx = 0;
    let numAtual = numeros[0];

    function update() {
      numAtual = numeros[idx];
      document.getElementById('numero').textContent = numAtual.num;
      document.getElementById('card').style.background = numAtual.cor;
      document.getElementById('info').textContent = numAtual.num + (numAtual.num === 1 ? ' fruta' : ' frutas');
      document.getElementById('hint').textContent = hints[Math.floor(Math.random()*hints.length)];
      document.getElementById('progress').style.width = ((idx+1)/numeros.length*100) + '%';
      document.getElementById('prevBtn').disabled = idx === 0;

      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = idx === numeros.length - 1 ? 'Finalizar, Pedro!' : 'Próximo →';

      const frutasDiv = document.getElementById('frutas');
      frutasDiv.innerHTML = '';
      for (let i=0; i<numAtual.num; i++) {
        const span = document.createElement('span');
        span.className = 'fruta';
        span.textContent = numAtual.emoji;
        span.style.animationDelay = (i*100) + 'ms';
        frutasDiv.appendChild(span);
      }
    }

    function speak(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR'; u.rate = 0.85; u.pitch = 1.2;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    }

    function next() {
      if (idx < numeros.length - 1) { idx++; update(); }
      else {
        document.getElementById('content').style.display = 'none';
        document.getElementById('complete').style.display = 'block';
        localStorage.setItem('stars_numeros', '3');
        createConfetti();
      }
    }

    function prev() { if (idx > 0) { idx--; update(); } }

    function createConfetti() {
      const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#FF8E53','#C44569','#A8E6CF'];
      for (let i=0; i<50; i++) {
        const el = document.createElement('div');
        el.style.cssText = `position:fixed;left:${Math.random()*100}vw;top:-10px;width:10px;height:10px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'0'};animation:fall ${Math.random()*2+2}s ease-out forwards;pointer-events:none;z-index:9999;`;
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),4000);
      }
    }

    const style = document.createElement('style');
    style.textContent = '@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(style);

    update();
  </script>
</body>
</html>
