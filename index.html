<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PigoKids - Aprenda Brincando!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; text-align: center; }
    h1 { font-size: 3.5rem; margin-bottom: 8px; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
    .subtitle { font-size: 1.3rem; opacity: 0.95; margin-bottom: 35px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      border-radius: 28px;
      padding: 35px 20px;
      text-decoration: none;
      color: white;
      display: block;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .card:hover { transform: translateY(-10px) scale(1.03); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
    .card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    .card-1 { background: linear-gradient(135deg, #f472b6, #e11d48); }
    .card-2 { background: linear-gradient(135deg, #22d3ee, #3b82f6); }
    .card-3 { background: linear-gradient(135deg, #fbbf24, #f97316); }
    .card-4 { background: linear-gradient(135deg, #34d399, #22c55e); }
    .emoji { font-size: 4rem; margin-bottom: 12px; display: block; }
    .card-title { font-size: 1.7rem; font-weight: bold; margin-bottom: 6px; }
    .card-desc { font-size: 1rem; opacity: 0.92; }
    .stars { margin-top: 12px; font-size: 1.5rem; }
    .star { color: #FFD700; text-shadow: 0 0 6px rgba(255,215,0,0.6); }
    .star-empty { opacity: 0.25; }
    footer { margin-top: 45px; opacity: 0.6; font-size: 1rem; }
    .welcome { 
      background: rgba(255,255,255,0.15); 
      backdrop-filter: blur(10px); 
      border-radius: 50px; 
      padding: 12px 30px; 
      display: inline-block; 
      margin-bottom: 30px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float { animation: float 3s ease-in-out infinite; }
    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="float">
      <h1>🌟 PigoKids</h1>
    </div>
    <p class="subtitle">Olá, Pedro! Pronto para aprender? 🎒</p>

    <div class="grid">
      <a href="vogais.html" class="card card-1">
        <span class="emoji">🔤</span>
        <div class="card-title">Vogais</div>
        <div class="card-desc">A, E, I, O, U com sons e animações!</div>
        <div class="stars" id="stars-vogais">
          <span class="star-empty">⭐</span><span class="star-empty">⭐</span><span class="star-empty">⭐</span>
        </div>
      </a>

      <a href="formas.html" class="card card-2">
        <span class="emoji">🔷</span>
        <div class="card-title">Formas</div>
        <div class="card-desc">Quadrado, círculo, triângulo e mais!</div>
        <div class="stars" id="stars-formas">
          <span class="star-empty">⭐</span><span class="star-empty">⭐</span><span class="star-empty">⭐</span>
        </div>
      </a>

      <a href="numeros.html" class="card card-3">
        <span class="emoji">🔢</span>
        <div class="card-title">Números</div>
        <div class="card-desc">Conte de 1 a 10 de forma divertida!</div>
        <div class="stars" id="stars-numeros">
          <span class="star-empty">⭐</span><span class="star-empty">⭐</span><span class="star-empty">⭐</span>
        </div>
      </a>

      <a href="fala.html" class="card card-4">
        <span class="emoji">🎤</span>
        <div class="card-title">Fala e Pronúncia</div>
        <div class="card-desc">Pratique falando com o microfone!</div>
        <div class="stars" id="stars-fala">
          <span class="star-empty">⭐</span><span class="star-empty">⭐</span><span class="star-empty">⭐</span>
        </div>
      </a>
    </div>

    <footer>Feito com 💜 para Pedro</footer>
  </div>

  <script>
    // Carregar estrelas salvas
    ['vogais','formas','numeros','fala'].forEach(function(id){
      var stars = localStorage.getItem('stars_' + id);
      if(stars === '3'){
        document.getElementById('stars-' + id).innerHTML = '<span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>';
      }
    });
  </script>
</body>
</html>
