<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Números - PigoKids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; text-align: center; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .back-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 10px 20px; border-radius: 50px; font-size: 1rem;
      cursor: pointer; text-decoration: none; font-weight: bold;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }
    h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .progress-bar { width: 100%; height: 14px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); border-radius: 10px; transition: width 0.5s ease; }
    .card {
      background: linear-gradient(135deg, #f87171, #e11d48);
      border-radius: 30px; padding: 50px 25px; margin-bottom: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }
    .numero { font-size: 8rem; font-weight: 900; text-shadow: 4px 4px 8px rgba(0,0,0,0.3); margin-bottom: 20px; }
    .frutas { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 420px; margin: 0 auto 25px; }
    .fruta { font-size: 2.5rem; animation: pop 0.4s ease-out; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .info { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
    .hint { opacity: 0.85; margin-bottom: 25px; font-size: 1rem; }
    .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .btn {
      background: linear-gradient(145deg, #FF6B6B, #ee5a5a);
      color: white; border: none; padding: 16px 32px;
      border-radius: 18px; font-size: 1.15rem; font-weight: bold;
      cursor: pointer; box-shadow: 0 6px 0 #c44444, 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.1s; font-family: inherit;
    }
    .btn:active { transform: translateY(6px); box-shadow: 0 0 0 #c44444; }
    .btn-green {
      background: linear-gradient(145deg, #4ECDC4, #3dbdb5);
      box-shadow: 0 6px 0 #2a9d96, 0 10px 25px rgba(0,0,0,0.2);
    }
    .btn-green:active { box-shadow: 0 0 0 #2a9d96; }
    .nav { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
    .nav-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 14px 28px; border-radius: 50px; font-size: 1.05rem;
      font-weight: bold; cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.35); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn.finish { background: white; color: #ea580c; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .complete { text-align: center; padding: 40px 20px; }
    .complete .trophy { font-size: 5rem; margin-bottom: 15px; }
    .complete h2 { font-size: 2.2rem; margin-bottom: 12px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .complete p { font-size: 1.2rem; opacity: 0.95; }
    .stars-big { font-size: 3rem; margin-top: 20px; }
    .star { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
    .confetti {
      position: fixed; width: 10px; height: 10px;
      animation: confetti-fall 3s ease-out forwards;
      pointer-events: none; z-index: 9999;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .float { animation: float 3s ease-in-out infinite; }
    @media (max-width: 600px) {
      .numero { font-size: 6rem; }
      .fruta { font-size: 2rem; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-btn">← Voltar</a>
      <h1>🔢 Números</h1>
      <div style="width:90px"></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:10%"></div></div>

    <div id="content">
      <div class="card" id="card">
        <div class="numero float" id="numero">1</div>
        <div class="frutas" id="frutas"></div>
        <div class="info" id="info">1 fruta</div>
        <div class="hint" id="hint">Vamos lá, Pedro! Você consegue! 💪</div>
        <div class="btn-group">
          <button class="btn" onclick="speak(String(numAtual.num))">🔊 Número</button>
          <button class="btn btn-green" onclick="speak(numAtual.num + ' ' + numAtual.palavra)">🔊 Contar</button>
        </div>
      </div>

      <div class="nav">
        <button class="nav-btn" id="prevBtn" onclick="prev()" disabled>← Anterior</button>
        <button class="nav-btn finish" id="nextBtn" onclick="next()">Próximo →</button>
      </div>
    </div>

    <div id="complete" class="complete" style="display:none">
      <div class="trophy">🎉🏆🎉</div>
      <h2>Pedro, você completou os números! Que orgulho! 🏅</h2>
      <p>Parabéns, Pedro! 🎉</p>
      <div class="stars-big">
        <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
      </div>
      <br><br>
      <a href="index.html" class="back-btn">Voltar ao Menu</a>
    </div>
  </div>

  <script>
    var numeros = [
      { num: 1, emoji: '🍎', cor: 'linear-gradient(135deg, #f87171, #e11d48)', palavra: 'maçã' },
      { num: 2, emoji: '🍌', cor: 'linear-gradient(135deg, #fbbf24, #f59e0b)', palavra: 'bananas' },
      { num: 3, emoji: '🍇', cor: 'linear-gradient(135deg, #a78bfa, #7c3aed)', palavra: 'uvas' },
      { num: 4, emoji: '🍊', cor: 'linear-gradient(135deg, #fb923c, #ea580c)', palavra: 'laranjas' },
      { num: 5, emoji: '🍓', cor: 'linear-gradient(135deg, #f472b6, #e11d48)', palavra: 'morangos' },
      { num: 6, emoji: '🍒', cor: 'linear-gradient(135deg, #f87171, #ec4899)', palavra: 'cerejas' },
      { num: 7, emoji: '🍑', cor: 'linear-gradient(135deg, #fdba74, #f97316)', palavra: 'pêssegos' },
      { num: 8, emoji: '🍍', cor: 'linear-gradient(135deg, #fde047, #eab308)', palavra: 'abacaxis' },
      { num: 9, emoji: '🥝', cor: 'linear-gradient(135deg, #4ade80, #16a34a)', palavra: 'kiwis' },
      { num: 10, emoji: '🍉', cor: 'linear-gradient(135deg, #22c55e, #0d9488)', palavra: 'melancias' }
    ];

    var hints = [
      "Vamos lá, Pedro! Você consegue! 💪",
      "Preste atenção, Pedro! 👀",
      "Pedro, fale bem alto e claro! 🗣️",
      "Quase lá, Pedro! Tente de novo! 🎯",
      "Pedro, respira fundo e tenta mais uma vez! 🌬️"
    ];

    var idx = 0;
    var numAtual = numeros[0];

    function update() {
      numAtual = numeros[idx];
      document.getElementById('numero').textContent = numAtual.num;
      document.getElementById('card').style.background = numAtual.cor;
      document.getElementById('info').textContent = numAtual.num + (numAtual.num === 1 ? ' fruta' : ' frutas');
      document.getElementById('hint').textContent = hints[Math.floor(Math.random()*hints.length)];
      document.getElementById('progress').style.width = ((idx+1)/numeros.length*100) + '%';
      document.getElementById('prevBtn').disabled = idx === 0;

      var nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = idx === numeros.length - 1 ? 'Finalizar, Pedro!' : 'Próximo →';

      var frutasDiv = document.getElementById('frutas');
      frutasDiv.innerHTML = '';
      for (var i=0; i<numAtual.num; i++) {
        var span = document.createElement('span');
        span.className = 'fruta';
        span.textContent = numAtual.emoji;
        span.style.animationDelay = (i*100) + 'ms';
        frutasDiv.appendChild(span);
      }
    }

    function speak(text) {
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR'; u.rate = 0.85; u.pitch = 1.2;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    }

    function next() {
      if (idx < numeros.length - 1) { idx++; update(); }
      else {
        document.getElementById('content').style.display = 'none';
        document.getElementById('complete').style.display = 'block';
        localStorage.setItem('stars_numeros', '3');
        createConfetti();
      }
    }

    function prev() { if (idx > 0) { idx--; update(); } }

    function createConfetti() {
      var colors = ['#FF6B6B','#4ECDC4','#FFE66D','#FF8E53','#C44569','#A8E6CF'];
      for (var i=0; i<50; i++) {
        var el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random()*100 + 'vw';
        el.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDuration = (Math.random()*2+2) + 's';
        el.style.animationDelay = (Math.random()*0.5) + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(el);
        setTimeout(function(e){ return function(){ e.remove(); }; }(el), 4000);
      }
    }

    update();
  </script>
</body>
</html>
